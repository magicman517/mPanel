<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>Verify your email &#8212; {{ panel_name }}</title>
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f4f4f5;
            font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
                &quot;Helvetica Neue&quot;, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        "
    >
        <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            border="0"
            style="background-color: #f4f4f5"
        >
            <tr>
                <td align="center" style="padding: 48px 16px">
                    <table
                        role="presentation"
                        width="100%"
                        cellspacing="0"
                        cellpadding="0"
                        border="0"
                        style="max-width: 560px"
                    >
                        <tr>
                            <td
                                style="
                                    background-color: #18181b;
                                    border-radius: 12px 12px 0 0;
                                    padding: 28px 40px;
                                    text-align: center;
                                "
                            >
                                <span
                                    style="
                                        font-size: 20px;
                                        font-weight: 700;
                                        color: #ffffff;
                                        letter-spacing: -0.3px;
                                    "
                                    >{{ panel_name }}</span
                                >
                            </td>
                        </tr>

                        <tr>
                            <td
                                style="
                                    background-color: #ffffff;
                                    padding: 40px;
                                    border-left: 1px solid #e4e4e7;
                                    border-right: 1px solid #e4e4e7;
                                "
                            >
                                <p
                                    style="
                                        margin: 0 0 6px 0;
                                        font-size: 22px;
                                        font-weight: 700;
                                        color: #18181b;
                                        letter-spacing: -0.4px;
                                        line-height: 1.3;
                                    "
                                >
                                    Verify your email address
                                </p>
                                <p
                                    style="
                                        margin: 0 0 32px 0;
                                        font-size: 15px;
                                        color: #71717a;
                                        line-height: 1.65;
                                    "
                                >
                                    Click the button below to confirm your email
                                    address
                                </p>

                                <!-- CTA Button -->
                                <table
                                    role="presentation"
                                    cellspacing="0"
                                    cellpadding="0"
                                    border="0"
                                >
                                    <tr>
                                        <td
                                            style="
                                                border-radius: 8px;
                                                background-color: #18181b;
                                            "
                                        >
                                            <a
                                                href="{{ verification_link }}"
                                                target="_blank"
                                                style="
                                                    display: inline-block;
                                                    padding: 13px 28px;
                                                    font-size: 15px;
                                                    font-weight: 600;
                                                    color: #ffffff;
                                                    text-decoration: none;
                                                    border-radius: 8px;
                                                    letter-spacing: 0.1px;
                                                    mso-padding-alt: 0;
                                                "
                                            >
                                                <!--[if mso
                                                    ]><i
                                                        style="
                                                            letter-spacing: 28px;
                                                            mso-font-width: -100%;
                                                            mso-text-raise: 30pt;
                                                        "
                                                        >&nbsp;</i
                                                    ><!
                                                [endif]-->
                                                Verify Email Address
                                                <!--[if mso
                                                    ]><i
                                                        style="
                                                            letter-spacing: 28px;
                                                            mso-font-width: -100%;
                                                        "
                                                        >&nbsp;</i
                                                    ><!
                                                [endif]-->
                                            </a>
                                        </td>
                                    </tr>
                                </table>

                                <p
                                    style="
                                        margin: 28px 0 0 0;
                                        font-size: 13px;
                                        color: #a1a1aa;
                                        line-height: 1.6;
                                    "
                                >
                                    Button not working? Copy and paste this link
                                    into your browser:
                                </p>
                                <p
                                    style="
                                        margin: 4px 0 0 0;
                                        font-size: 13px;
                                        line-height: 1.5;
                                    "
                                >
                                    <a
                                        href="{{ verification_link }}"
                                        style="
                                            color: #52525b;
                                            word-break: break-all;
                                        "
                                        >{{ verification_link }}</a
                                    >
                                </p>
                            </td>
                        </tr>

                        <tr>
                            <td
                                style="
                                    background-color: #fafafa;
                                    border: 1px solid #e4e4e7;
                                    border-top: none;
                                    border-radius: 0 0 12px 12px;
                                    padding: 20px 40px;
                                "
                            >
                                <p
                                    style="
                                        margin: 0;
                                        font-size: 12px;
                                        color: #a1a1aa;
                                        line-height: 1.7;
                                        text-align: center;
                                    "
                                >
                                    This is an automated email, please do not
                                    reply to this message
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
